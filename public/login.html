<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004a7c">
    <title>SecondWare | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth-style.css">
    <link rel="stylesheet" href="css/mobile-fixes.css">
</head>

<body>

    <header>
        <button class="hamburger-menu" id="hamburger-btn" aria-label="Menu">☰</button>
        <a href="index.html" id="logo-toggle" class="logo-container">
            <img src="assets/logo.png" alt="S" height="40">
            <span class="logo-text">SecondWare</span>
        </a>

        <!-- Spacer for consistency -->
        <div style="flex: 1;"></div>

        <div class="header-right">
            <nav id="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="catalog.html">Catalog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Side panel dashboard and overlay -->
    <div id="side-overlay" class="side-overlay" hidden></div>
    <aside id="side-panel" class="side-panel" aria-hidden="true">
        <button class="close-btn" id="side-close" aria-label="Close">✕</button>
        <div class="panel-content">
            <h3>Dashboard</h3>
            <div class="panel-list">
                <a href="login.html" class="panel-item">Login</a>
                <a href="#" class="panel-item">About</a>
                   <a href="#" class="panel-item">Orders</a>
                   <a href="#" class="panel-item">Settings</a>
            </div>
        </div>
    </aside>

    <div class="auth-container">
        <div class="auth-card">
            <h2 id="form-title">Login</h2>

            <div id="auth-form-container">
                <!-- Login Mode Toggle -->
                <div class="login-type-toggle" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button id="type-password" class="type-btn active" onclick="setLoginType('password')"
                        style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid var(--primary-teal); background: var(--primary-teal); color: white; border-radius: 5px;">Password</button>
                    <button id="type-otp" class="type-btn" onclick="setLoginType('otp')"
                        style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ccc; background: white; color: #333; border-radius: 5px;">Email
                        OTP</button>
                </div>

                <input type="email" id="email" class="auth-input" placeholder="Email Address" required>

                <!-- Password Login Fields -->
                <div id="password-fields">
                    <div class="password-wrapper">
                        <input type="password" id="password" class="auth-input" placeholder="Password" required>
                        <button type="button" id="toggle-password" class="toggle-password-btn"
                            aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div id="password-strength-container" style="margin-top: 5px; display: none;">
                        <div style="height: 4px; background: #eee; border-radius: 2px; overflow: hidden;">
                            <div id="strength-bar"
                                style="width: 0%; height: 100%; transition: width 0.3s, background 0.3s;"></div>
                        </div>
                        <p id="strength-text" style="font-size: 0.75em; margin-top: 3px; color: #666;"></p>
                    </div>
                </div>

                <!-- OTP Login Fields -->
                <div id="otp-fields" style="display: none; margin-top: 15px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="otp-input" class="auth-input" placeholder="6-digit Code" maxlength="6"
                            style="flex: 1;">
                        <button id="get-otp-btn" onclick="handleSendOtp()" class="auth-btn"
                            style="width: auto; padding: 0 15px; margin: 0; font-size: 0.9em;">Send OTP</button>
                    </div>
                </div>

                <button id="auth-btn" onclick="handleSubmit()" class="auth-btn" style="margin-top: 20px;">
                    Sign In
                </button>

                <!-- Google Login Button -->
                <div class="auth-separator">OR</div>
                <button type="button" onclick="initiateGoogleLogin()" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"
                        class="google-icon">
                    Sign in with Google
                </button>

                <p style="text-align: center; margin-top: 10px;">
                    <a href="#" onclick="openForgotPasswordModal(event)" id="forgot-password-link"
                        style="color: #666; font-size: 0.9em; text-decoration: none;">Forgot Password?</a>
                </p>

                <p style="text-align: center; margin-top: 15px;">
                    <span id="toggle-text">Don't have an account?</span>
                    <a href="#" onclick="toggleAuthMode(event)" id="toggle-link"
                        style="color: var(--primary-teal); font-weight: bold;">Sign Up</a>
                </p>

                <p style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #666;">
                    <a href="index.html" style="color: var(--primary-teal); text-decoration: none;">Back to Home</a>
                </p>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgot-password-modal" class="modal" hidden>
            <div class="modal-overlay" id="forgot-password-overlay"></div>
            <div class="modal-content">
                <button class="modal-close" id="forgot-password-close" aria-label="Close">✕</button>
                <h2 style="text-align: center; margin-bottom: 20px;">Reset Password</h2>
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your email address and we'll send
                    you a link to reset your password.</p>

                <input type="email" id="reset-email" class="auth-input" placeholder="Email Address"
                    style="margin-bottom: 15px;">
                <button id="send-reset-btn" class="auth-btn" onclick="handlePasswordReset()">Send Reset Link</button>

                <p style="text-align: center; margin-top: 15px; font-size: 0.9em;">
                    <a href="#" onclick="closeForgotPasswordModal(event)"
                        style="color: var(--primary-teal); text-decoration: none;">Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/validation.js"></script>
    <script>
        // Side-panel toggle logic (logo triggers the dashboard)
        const logoToggle = document.getElementById('logo-toggle');
        const sidePanel = document.getElementById('side-panel');
        const sideOverlay = document.getElementById('side-overlay');
        const sideClose = document.getElementById('side-close');

        function openSidePanel() {
            sidePanel.classList.add('active');
            sideOverlay.classList.add('active');
            sideOverlay.removeAttribute('hidden');
            sidePanel.setAttribute('aria-hidden', 'false');
        }

        function closeSidePanel() {
            sidePanel.classList.remove('active');
            sideOverlay.classList.remove('active');
            sideOverlay.setAttribute('hidden', '');
            sidePanel.setAttribute('aria-hidden', 'true');
        }

        logoToggle.addEventListener('click', (e) => {
            // Don't open side panel when on Android; allow logo navigation there
            const isAndroid = /Android/i.test(navigator.userAgent || '');
            if (isAndroid) return;
            e.preventDefault();
            openSidePanel();
        });

        const hamburgerBtn = document.getElementById('hamburger-btn');
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', openSidePanel);
        }

        sideOverlay.addEventListener('click', closeSidePanel);
        sideClose.addEventListener('click', closeSidePanel);

        // Close with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSidePanel();
        });

        // Set referrer based on where they came from
        const urlParams = new URLSearchParams(window.location.search);
        const referrer = urlParams.get('from') || sessionStorage.getItem('login_referrer') || 'index.html';

        // Update home link to go back to referrer
        const homeLink = document.querySelector('a[href="index.html"]');
        if (homeLink) {
            homeLink.href = referrer;
        }

        // Setup form validation
        setTimeout(() => {
            setupEmailValidation('email');
            setupPasswordValidation('password');
        }, 100);

        function setupPasswordValidation(inputId) {
            const passwordInput = document.getElementById(inputId);
            if (!passwordInput) return;

            passwordInput.addEventListener('blur', () => {
                if (isLogin) return; // Skip strict validation on login

                const password = passwordInput.value;
                if (password) {
                    const validation = validatePassword(password);
                    if (!validation.isValid) {
                        showValidationFeedback(passwordInput, false, validation.message);
                    } else {
                        showValidationFeedback(passwordInput, true);
                    }
                }
            });
        }
    </script>
    <script>
        let isLogin = true;
        let loginType = 'password'; // 'password' or 'otp'
        let signupOTPMode = false;

        function setLoginType(type) {
            loginType = type;
            const passwordFields = document.getElementById('password-fields');
            const otpFields = document.getElementById('otp-fields');
            const btnPass = document.getElementById('type-password');
            const btnOtp = document.getElementById('type-otp');
            const authBtn = document.getElementById('auth-btn');

            if (type === 'password') {
                passwordFields.style.display = 'block';
                otpFields.style.display = 'none';
                btnPass.style.background = 'var(--primary-teal)';
                btnPass.style.color = 'white';
                btnOtp.style.background = 'white';
                btnOtp.style.color = '#333';
                authBtn.textContent = isLogin ? 'Sign In' : (signupOTPMode ? 'Verify & Register' : 'Sign Up');
            } else {
                passwordFields.style.display = 'none';
                otpFields.style.display = 'block';
                btnPass.style.background = 'white';
                btnPass.style.color = '#333';
                btnOtp.style.background = 'var(--primary-teal)';
                btnOtp.style.color = 'white';
                authBtn.textContent = 'Verify & Login';
                // OTP is only for login, not signup
                if (!isLogin) toggleAuthMode();
            }
        }

        function toggleAuthMode(e) {
            if (e) e.preventDefault();
            isLogin = !isLogin;
            signupOTPMode = false; // Reset signup mode

            const title = document.getElementById('form-title');
            const btn = document.getElementById('auth-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');
            const typeToggle = document.querySelector('.login-type-toggle');
            const otpFields = document.getElementById('otp-fields');
            const passwordFields = document.getElementById('password-fields');

            if (isLogin) {
                title.textContent = 'Login';
                btn.textContent = loginType === 'otp' ? 'Verify & Login' : 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign Up';
                typeToggle.style.display = 'flex';
                setLoginType(loginType);
            } else {
                title.textContent = 'Create Account';
                btn.textContent = 'Sign Up';
                toggleText.textContent = "Already have an account?";
                toggleLink.textContent = 'Login';
                typeToggle.style.display = 'none';
                otpFields.style.display = 'none';
                passwordFields.style.display = 'block';
                setLoginType('password'); // Always use password initially for signup
            }

            // Clear validation when toggling
            const passwordInput = document.getElementById('password');
            const emailInput = document.getElementById('email');
            const strengthContainer = document.getElementById('password-strength-container');

            if (passwordInput) showValidationFeedback(passwordInput, true);
            if (emailInput) showValidationFeedback(emailInput, true);
            if (strengthContainer) strengthContainer.style.display = 'none';
        }

        // Real-time password strength update
        document.getElementById('password').addEventListener('input', function () {
            if (isLogin) return; // Skip strength indicator on login

            const password = this.value;
            const container = document.getElementById('password-strength-container');
            const validation = validatePassword(password);

            const percentage = (validation.passedCount / 5) * 100;
            bar.style.width = percentage + '%';
            bar.style.background = validation.strengthColor;
            text.textContent = `Strength: ${validation.strength} - ${validation.message}`;
            text.style.color = validation.strengthColor;
        });

        async function handleSendOtp() {
            const email = document.getElementById('email').value.trim();
            if (!isValidEmail(email)) {
                alert('Please enter a valid email address first.');
                return;
            }

            const sendBtn = document.getElementById('get-otp-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                await sendOtp(email);
                alert('OTP sent to your email! Please check your inbox.');
                // Start countdown or just enable button after delay
                let countdown = 60;
                const timer = setInterval(() => {
                    sendBtn.textContent = `Resend in ${countdown}s`;
                    countdown--;
                    if (countdown < 0) {
                        clearInterval(timer);
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'Send OTP';
                    }
                }, 1000);
            } catch (error) {
                alert('Error: ' + error.message);
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send OTP';
            }
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();

            // Validate email
            if (!isValidEmail(email)) {
                alert('Please enter a valid email address.');
                showValidationFeedback(document.getElementById('email'), false, 'Invalid email address');
                return;
            }

            if (loginType === 'otp' || (signupOTPMode)) {
                const otp = document.getElementById('otp-input').value.trim();
                if (!otp || otp.length < 6) {
                    alert('Please enter the verification code sent to your email.');
                    return;
                }

                try {
                    const authBtn = document.getElementById('auth-btn');
                    authBtn.disabled = true;
                    authBtn.textContent = 'Verifying...';

                    const data = isLogin ? await verifyOtp(email, otp) : await verifySignup(email, otp);

                    if (data.token) {
                        sessionStorage.setItem('auth_token', data.token);
                        sessionStorage.setItem('user_email', email);
                        if (data.role) sessionStorage.setItem('user_role', data.role);

                        const referrer = sessionStorage.getItem('login_referrer');
                        sessionStorage.removeItem('login_referrer');
                        window.location.href = referrer || 'index.html';
                    }
                } catch (error) {
                    alert('Verification failed: ' + error.message);
                } finally {
                    const authBtn = document.getElementById('auth-btn');
                    authBtn.disabled = false;
                    authBtn.textContent = isLogin ? 'Verify & Login' : 'Verify & Register';
                }
                return;
            }

            const password = document.getElementById('password').value;

            if (!password) {
                alert('Please enter your password.');
                return;
            }

            if (isLogin) {
                await loginUser(email, password);
            } else {
                const authBtn = document.getElementById('auth-btn');
                authBtn.disabled = true;
                authBtn.textContent = 'Initiating Signup...';

                const result = await registerUser(email, password);
                if (result.success) {
                    // Transition to OTP entry mode for signup
                    signupOTPMode = true;
                    document.getElementById('otp-fields').style.display = 'block';
                    document.getElementById('password-fields').style.display = 'none';
                    authBtn.textContent = 'Verify & Register';

                    // Show OTP input helper
                    const getOtpBtn = document.getElementById('get-otp-btn');
                    getOtpBtn.style.display = 'none'; // Hide resend button initially to avoid confusion
                } else {
                    if (result.error === 'User already registered') {
                        alert('This email is already registered. Switching you to Login.');
                        toggleAuthMode();
                    } else {
                        alert('Error: ' + result.error);
                    }
                }
                authBtn.disabled = false;
            }
        }

        // Allow pressing Enter to submit
        document.getElementById('email').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSubmit();
        });

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSubmit();
        });

        document.getElementById('otp-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSubmit();
        });

        // Password visibility toggle
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener('click', function (e) {
                e.preventDefault();

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    togglePasswordBtn.textContent = '👁️‍🗨️';
                } else {
                    passwordInput.type = 'password';
                    togglePasswordBtn.textContent = '👁️';
                }
            });
        }

        // Forgot Password Modal Functions
        const forgotPasswordModal = document.getElementById('forgot-password-modal');
        const forgotPasswordOverlay = document.getElementById('forgot-password-overlay');
        const forgotPasswordClose = document.getElementById('forgot-password-close');
        const resetEmailInput = document.getElementById('reset-email');

        function openForgotPasswordModal(e) {
            if (e) e.preventDefault();
            forgotPasswordModal.removeAttribute('hidden');
            resetEmailInput.value = '';
            resetEmailInput.focus();
        }

        function closeForgotPasswordModal(e) {
            if (e) e.preventDefault();
            forgotPasswordModal.setAttribute('hidden', '');
        }

        forgotPasswordClose.addEventListener('click', closeForgotPasswordModal);
        forgotPasswordOverlay.addEventListener('click', closeForgotPasswordModal);

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !forgotPasswordModal.hasAttribute('hidden')) {
                closeForgotPasswordModal();
            }
        });

        async function handlePasswordReset() {
            const email = document.getElementById('reset-email').value.trim();

            if (!email) {
                alert('Please enter your email address.');
                return;
            }

            const sendBtn = document.getElementById('send-reset-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'reset-password',
                        email: email
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Password reset link has been sent to your email. Please check your inbox.');
                    closeForgotPasswordModal();
                } else {
                    alert('Error: ' + (data.error || 'Failed to send reset link'));
                }
            } catch (error) {
                console.error('Password reset error:', error);
                alert('Error: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Reset Link';
            }
        }

        // Allow Enter key in reset email field
        document.getElementById('reset-email').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handlePasswordReset();
        });
    </script>

    <script src="js/cookie-consent.js"></script>
</body>

</html>
