<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004a7c">
    <title>SecondWare | Reset Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile-fixes.css">
    <link rel="stylesheet" href="css/auth-style.css">
</head>

<body>

<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="logo">Second<span>Ware</span></a>

    <nav class="main-nav" id="main-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="catalog.html">Catalog</a>
      <a href="index.html#warranty-policy">About</a>
      <a href="#" onclick="openOrdersModal(); return false;" class="logged-in-only">My orders</a>
      <a href="settings.html" class="logged-in-only">Settings</a>
      <a href="admin/admin.html" class="admin-only">Admin</a>
    </nav>

    <div class="header-actions">
      <button class="icon-btn" id="wishlist-toggle" aria-label="Wishlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20.5s-7.5-4.6-9.8-9C.6 8 1.6 4.7 4.6 3.7c2-.7 4 0 5.4 1.8 1.4-1.8 3.4-2.5 5.4-1.8 3 1 4 4.3 2.4 7.8-2.3 4.4-9.8 9-9.8 9Z"/></svg>
        <span id="wishlist-count" class="cart-badge">0</span>
      </button>
      <button class="icon-btn" id="cart-toggle" aria-label="Shopping Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h2l2.2 11.2a2 2 0 0 0 2 1.6h7.6a2 2 0 0 0 2-1.6L20.5 8H6"/><circle cx="9.5" cy="20" r="1.2"/><circle cx="17" cy="20" r="1.2"/></svg>
        <span id="cart-count" class="cart-badge">0</span>
      </button>
      <a href="login.html" id="auth-link" class="btn btn-outline">Log in</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="main-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Set New Password</h2>

            <div id="reset-form-container" style="display: none;">
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your new password below.</p>

                <div class="password-wrapper">
                    <input type="password" id="new-password" class="auth-input" placeholder="New Password" required>
                    <button type="button" id="toggle-password-1" class="toggle-password-btn"
                        aria-label="Toggle password visibility">👁️</button>
                </div>

                <div class="password-wrapper">
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Confirm Password"
                        required style="margin-top: 10px;">
                    <button type="button" id="toggle-password-2" class="toggle-password-btn"
                        aria-label="Toggle password visibility">👁️</button>
                </div>

                <button id="reset-btn" onclick="handleResetPassword()" class="auth-btn" style="margin-top: 20px;">
                    Update Password
                </button>

                <p style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #666;">
                    <a href="login.html" style="color: var(--primary-teal); text-decoration: none;">Back to Login</a>
                </p>
            </div>

            <div id="reset-loading" style="text-align: center;">
                <p>Verifying reset link...</p>
            </div>

            <div id="reset-error" style="display: none; text-align: center; color: #d32f2f;">
                <p id="error-message"></p>
                <p style="margin-top: 15px;">
                    <a href="login.html" style="color: var(--primary-teal); text-decoration: none;">Return to Login</a>
                </p>
            </div>

            <div id="reset-success" style="display: none; text-align: center;">
                <p style="color: #4caf50; margin-bottom: 15px;">✓ Password updated successfully!</p>
                <p>
                    <a href="login.html" style="color: var(--primary-teal); text-decoration: none;">Go to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Get reset token from URL
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const resetToken = urlParams.get('access_token');
        const tokenType = urlParams.get('type');
        const formContainer = document.getElementById('reset-form-container');
        const loadingContainer = document.getElementById('reset-loading');
        const errorContainer = document.getElementById('reset-error');
        const errorMessage = document.getElementById('error-message');
        const successContainer = document.getElementById('reset-success');

        // Check if we have a valid reset token
        if (!resetToken || tokenType !== 'recovery') {
            loadingContainer.style.display = 'none';
            errorContainer.style.display = 'block';
            errorMessage.textContent = 'Invalid or missing reset link. Please request a new password reset.';
        } else {
            loadingContainer.style.display = 'none';
            formContainer.style.display = 'block';
        }

        // Password visibility toggles
        const toggleButtons = [
            { btn: document.getElementById('toggle-password-1'), input: document.getElementById('new-password') },
            { btn: document.getElementById('toggle-password-2'), input: document.getElementById('confirm-password') }
        ];

        toggleButtons.forEach(({ btn, input }) => {
            if (btn && input) {
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    if (input.type === 'password') {
                        input.type = 'text';
                        btn.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        btn.textContent = '👁️';
                    }
                });
            }
        });

        async function handleResetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!newPassword || !confirmPassword) {
                alert('Please fill in all fields.');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            const resetBtn = document.getElementById('reset-btn');
            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'update-password',
                        token: resetToken,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    formContainer.style.display = 'none';
                    successContainer.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    alert('Error: ' + (data.error || 'Failed to update password'));
                }
            } catch (error) {
                console.error('Password update error:', error);
                alert('Error: ' + error.message);
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            }
        }

        // Allow Enter key to submit
        document.getElementById('confirm-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleResetPassword();
        });
    </script>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cookie-consent.js"></script>
    <script src="js/chatbot.js" type="module"></script>
</body>

</html>
