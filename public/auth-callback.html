<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... | SecondWare</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .callback-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8f9fa;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-teal);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            color: var(--deep-blue);
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h2>Authenticating with Google...</h2>
        <p>Please wait while we set up your session.</p>
    </div>

    <script src="js/api.js"></script>
    <script>
        window.onload = async () => {
            // Supabase sends the token in the URL fragment (#access_token=...)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const error = params.get('error_description');

            if (error) {
                alert('Authentication error: ' + error);
                window.location.href = 'login.html';
                return;
            }

            if (accessToken) {
                // Finalize the login using the API helper
                await finalizeGoogleLogin(accessToken);
            } else {
                console.error('No access token found in URL fragment');
                window.location.href = 'login.html';
            }
        };
    </script>
    <script src="js/cookie-consent.js"></script>
</body>

</html>
